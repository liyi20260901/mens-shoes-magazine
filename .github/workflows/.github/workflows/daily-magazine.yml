name: Daily Men's Shoes Magazine

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      - run: python batch_scraper.py
        timeout-minutes: 10
      - run: python generate_magazine.py
        timeout-minutes: 5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './output'
      - uses: actions/deploy-pages@v4
